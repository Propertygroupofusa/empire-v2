<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Production - Get Started Now</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Pricing Cards */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .pricing-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .pricing-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .pricing-card.popular {
            border: 3px solid #667eea;
            transform: scale(1.05);
        }

        .pricing-card.popular::before {
            content: "MOST POPULAR";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .tier-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .tier-price {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .tier-period {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .tier-description {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .tier-features {
            list-style: none;
            margin-bottom: 30px;
        }

        .tier-features li {
            padding: 8px 0;
            color: #666;
            border-bottom: 1px solid #eee;
            position: relative;
            padding-left: 25px;
        }

        .tier-features li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }

        .tier-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tier-button.subscribe {
            background: #667eea;
            color: white;
        }

        .tier-button.subscribe:hover {
            background: #5568d3;
        }

        .tier-button.selected {
            background: #28a745;
            color: white;
        }

        /* Custom Form */
        .custom-purchase {
            background: white;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .custom-purchase h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group textarea {
            grid-column: 1 / -1;
            min-height: 100px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .price-display {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .price-display h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .price-display .amount {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .purchase-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            grid-column: 1 / -1;
        }

        .purchase-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .pricing-card.popular {
                transform: scale(1);
            }

            .pricing-grid {
                grid-template-columns: 1fr;
            }

            .custom-purchase {
                padding: 20px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Professional Video Production</h1>
            <p>Choose your plan and get started today</p>
        </div>

        <!-- Pricing Tiers -->
        <div class="pricing-grid" id="pricingGrid"></div>

        <!-- Custom Purchase Form -->
        <div class="custom-purchase">
            <h2>📹 Get Your Custom Video</h2>
            <div id="message" class="message"></div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="customerName">Your Name *</label>
                    <input type="text" id="customerName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="customerEmail">Email *</label>
                    <input type="email" id="customerEmail" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="company">Company</label>
                    <input type="text" id="company" placeholder="Your Company">
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
                </div>

                <div class="form-group">
                    <label for="videoType">Video Type *</label>
                    <select id="videoType" required>
                        <option value="">Select a type...</option>
                        <option value="explainer">Explainer ($500)</option>
                        <option value="testimonial">Testimonial ($500)</option>
                        <option value="product_demo">Product Demo ($600)</option>
                        <option value="social_media">Social Media ($400)</option>
                        <option value="educational">Educational ($550)</option>
                        <option value="promotional">Promotional ($650)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="avatar">Avatar *</label>
                    <select id="avatar" required>
                        <option value="">Select an avatar...</option>
                        <option value="anna">Anna (Female)</option>
                        <option value="carlos">Carlos (Male)</option>
                        <option value="emma">Emma (Female)</option>
                        <option value="james">James (Male)</option>
                        <option value="lisa">Lisa (Female)</option>
                        <option value="marcus">Marcus (Male)</option>
                        <option value="olivia">Olivia (Female)</option>
                        <option value="ryan">Ryan (Male)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="language">Language *</label>
                    <select id="language" required>
                        <option value="">Select a language...</option>
                        <option value="english_us">English (US)</option>
                        <option value="english_uk">English (UK)</option>
                        <option value="english_au">English (AU)</option>
                        <option value="spanish">Spanish (Spain)</option>
                        <option value="spanish_mx">Spanish (Mexico)</option>
                        <option value="french">French</option>
                        <option value="german">German</option>
                        <option value="italian">Italian</option>
                        <option value="portuguese">Portuguese (Brazil)</option>
                        <option value="portuguese_pt">Portuguese (PT)</option>
                        <option value="dutch">Dutch</option>
                        <option value="swedish">Swedish</option>
                        <option value="norwegian">Norwegian</option>
                        <option value="danish">Danish</option>
                        <option value="polish">Polish</option>
                        <option value="russian">Russian</option>
                        <option value="japanese">Japanese</option>
                        <option value="korean">Korean</option>
                        <option value="chinese_simplified">Chinese (Simplified)</option>
                        <option value="chinese_traditional">Chinese (Traditional)</option>
                        <option value="arabic">Arabic</option>
                        <option value="hindi">Hindi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="delivery">Delivery Timeline *</label>
                    <select id="delivery" required>
                        <option value="5">Economy (5 days)</option>
                        <option value="2">Standard (2-3 days)</option>
                        <option value="1">Rush 24hr (+$150)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="script">Script or Topic *</label>
                    <textarea id="script" placeholder="Tell us what you want the video to say..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="audience">Target Audience</label>
                    <input type="text" id="audience" placeholder="e.g., Business owners, College students">
                </div>

                <div class="price-display">
                    <h3>Total Price</h3>
                    <div class="amount" id="totalPrice">$750</div>
                </div>

                <button class="purchase-button" onclick="submitOrder()">
                    Get My Quote & Pay Now
                </button>
            </div>
        </div>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        let STRIPE_PUBLISHABLE_KEY = null;

        // Fetch Stripe publishable key on load - needed before any checkout redirect
        window.addEventListener('load', async function() {
            try {
                const r = await fetch('/orders/stripe-key');
                const data = await r.json();
                STRIPE_PUBLISHABLE_KEY = data.publishable_key;
            } catch (error) {
                console.error('Failed to load Stripe key:', error);
            }
        });

        // Base prices for video types
        const videoTypePrices = {
            explainer: 50000,
            testimonial: 50000,
            product_demo: 60000,
            social_media: 40000,
            educational: 55000,
            promotional: 65000,
        };

        // Fetch and display pricing tiers
        async function loadPricingTiers() {
            try {
                const response = await fetch('/subscriptions/tiers');
                const data = await response.json();
                const grid = document.getElementById('pricingGrid');

                data.tiers.forEach((tier, index) => {
                    const priceStr = tier.monthly_price === 0 ? 'Free' : `$${tier.monthly_price / 100}/mo`;
                    const popular = tier.id === 'pro' ? 'popular' : '';

                    const card = document.createElement('div');
                    card.className = `pricing-card ${popular}`;
                    card.innerHTML = `
                        <div class="tier-name">${tier.name}</div>
                        <div class="tier-price">${priceStr}</div>
                        <div class="tier-period">${tier.videos_per_month} videos per month</div>
                        <div class="tier-description">${tier.description}</div>
                        <ul class="tier-features">
                            ${tier.features.map(f => `<li>${f}</li>`).join('')}
                        </ul>
                        <button class="tier-button subscribe" onclick="selectTier('${tier.id}')">
                            ${tier.monthly_price === 0 ? 'Start Free Trial' : 'Subscribe Now'}
                        </button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Failed to load tiers:', error);
            }
        }

        // Select a subscription tier
        async function selectTier(tierId) {
            const email = document.getElementById('customerEmail').value;
            const name = document.getElementById('customerName').value;

            if (!email || !name) {
                showMessage('Please fill in your name and email first', 'error');
                return;
            }

            try {
                // Create subscription checkout
                const response = await fetch(
                    `/subscriptions/checkout?customer_email=${encodeURIComponent(email)}&customer_name=${encodeURIComponent(name)}&tier_id=${tierId}`,
                    { method: 'POST' }
                );

                const data = await response.json();

                if (data.success) {
                    if (tierId === 'free') {
                        showMessage(`Welcome to ${data.tier}! 🎉 Your free trial is active.`, 'success');
                        setTimeout(() => {
                            window.location.href = '/quote';
                        }, 2000);
                    } else {
                        showMessage('Redirecting to payment...', 'success');
                        // Redirect to Stripe checkout
                        window.location.href = data.redirect_url;
                    }
                } else {
                    showMessage(data.detail || 'Failed to create subscription', 'error');
                }
            } catch (error) {
                showMessage(`Error: ${error.message}`, 'error');
            }
        }

        // Update price display
        function updatePrice() {
            const videoType = document.getElementById('videoType').value;
            const delivery = parseInt(document.getElementById('delivery').value);

            let total = videoTypePrices[videoType] || 50000;

            // Add rush fee
            if (delivery === 1) {
                total += 15000; // $150 for rush
            }

            const dollars = total / 100;
            document.getElementById('totalPrice').textContent = `$${dollars.toFixed(0)}`;
        }

        // Event listeners for price updates
        document.getElementById('videoType').addEventListener('change', updatePrice);
        document.getElementById('delivery').addEventListener('change', updatePrice);

        // Submit order
        async function submitOrder() {
            const required = [
                'customerName', 'customerEmail', 'videoType',
                'avatar', 'language', 'script'
            ];

            for (const id of required) {
                if (!document.getElementById(id).value) {
                    showMessage(`Please fill in all required fields`, 'error');
                    return;
                }
            }

            const payload = {
                customer_name: document.getElementById('customerName').value,
                customer_email: document.getElementById('customerEmail').value,
                customer_company: document.getElementById('company').value,
                phone: document.getElementById('phone').value || null,
                video_type: document.getElementById('videoType').value,
                script_or_topic: document.getElementById('script').value,
                target_audience: document.getElementById('audience').value,
                avatar: document.getElementById('avatar').value,
                language: document.getElementById('language').value,
                delivery_days: parseInt(document.getElementById('delivery').value),
            };

            try {
                const response = await fetch('/orders/request-quote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await response.json();

                if (response.ok) {
                    showMessage(`Quote created! Order #${data.order_id} - $${data.quote_price}`, 'success');
                    setTimeout(() => proceedToCheckout(data.order_id), 1500);
                } else {
                    showMessage(data.detail || 'Failed to create quote', 'error');
                }
            } catch (error) {
                showMessage(`Error: ${error.message}`, 'error');
            }
        }

        // Create the Stripe checkout session and redirect - create-checkout is a
        // POST endpoint returning JSON, so it can't be reached via a plain
        // navigation link; Stripe.js handles the actual redirect.
        async function proceedToCheckout(orderId) {
            try {
                const response = await fetch(`/orders/${orderId}/create-checkout`, { method: 'POST' });
                const data = await response.json();

                if (!response.ok || !data.session_id) {
                    showMessage(data.detail || 'Failed to start checkout', 'error');
                    return;
                }

                if (!STRIPE_PUBLISHABLE_KEY) {
                    showMessage('Payment system unavailable, please try again shortly', 'error');
                    return;
                }

                const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);
                const result = await stripe.redirectToCheckout({ sessionId: data.session_id });
                if (result.error) {
                    showMessage(result.error.message, 'error');
                }
            } catch (error) {
                showMessage(`Error: ${error.message}`, 'error');
            }
        }

        // Show/hide messages
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type} show`;
            setTimeout(() => msg.classList.remove('show'), 5000);
        }

        // Initialize
        loadPricingTiers();
        updatePrice();
    </script>
</body>
</html>
