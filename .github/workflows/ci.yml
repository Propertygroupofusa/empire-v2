name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  syntax-and-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # This step alone would have caught the python-binance==1.20.1 pin
      # (a version that was never published) - it broke the Railway build
      # for the entire app, not just the one optional bot that used it,
      # and nothing here would have caught it before it shipped.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Catches real syntax errors in any bot/router before they reach
      # main - a broken file with a guarded import in main.py wouldn't
      # crash the app at runtime, but would silently disable whatever
      # that file provides. This surfaces it as a build failure instead.
      - name: Compile-check every Python file
        run: |
          find . -name "*.py" -not -path "./.git/*" -print0 \
            | xargs -0 -n1 python -m py_compile

      # Smoke check that the actual FastAPI app object loads cleanly -
      # this is the same command documented in
      # .claude/skills/run-empire-v2/SKILL.md's Build section.
      - name: Import FastAPI app
        run: python -c "from main import app; print('FastAPI app loaded OK')"
