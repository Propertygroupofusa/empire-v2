name: Deploy to Production

on:
  push:
    branches:
      - claude/custom-delivery-app-di39ur
  pull_request:
    branches:
      - claude/custom-delivery-app-di39ur

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check imports
        run: python3 -c "import main; print('✓ Main app imports successfully')"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t empire-v2:latest .

      - name: Verify Docker build
        run: docker run --rm empire-v2:latest python -m py_compile main.py

      - name: Notify deployment ready
        run: echo "✓ Build successful - ready for Railway deployment"
