<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Crypto Trading Bot Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #00ff00;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 10px;
        }

        .header p {
            color: #00cc00;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .stat-card h3 {
            color: #00cc00;
            margin-bottom: 10px;
            font-size: 0.9em;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .positive {
            color: #00ff00 !important;
        }

        .negative {
            color: #ff0000 !important;
        }

        .neutral {
            color: #ffaa00 !important;
        }

        .info-section {
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .info-section h2 {
            color: #00ff00;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ff00;
            font-size: 1.3em;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            padding-bottom: 10px;
        }

        .position-item, .trade-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            align-items: center;
            font-size: 0.9em;
        }

        .position-item:last-child, .trade-item:last-child {
            border-bottom: none;
        }

        .symbol {
            color: #00ff00;
            font-weight: bold;
        }

        .price {
            color: #00cc00;
        }

        .pnl-positive {
            color: #00ff00;
        }

        .pnl-negative {
            color: #ff3333;
        }

        .loading {
            color: #ffaa00;
            font-style: italic;
        }

        .error {
            color: #ff3333;
            padding: 15px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 4px;
            margin-top: 10px;
        }

        .update-time {
            color: #00cc00;
            font-size: 0.85em;
            text-align: right;
            margin-top: 15px;
            border-top: 1px solid rgba(0, 255, 0, 0.2);
            padding-top: 10px;
        }

        .mode-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
        }

        .mode-live {
            background: rgba(255, 0, 0, 0.3);
            color: #ff3333;
            border: 1px solid #ff3333;
        }

        .mode-paper {
            background: rgba(100, 150, 200, 0.3);
            color: #66ccff;
            border: 1px solid #66ccff;
        }

        .mode-demo {
            background: rgba(255, 170, 0, 0.3);
            color: #ffaa00;
            border: 1px solid #ffaa00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 LIVE CRYPTO TRADING DASHBOARD</h1>
            <p>Automated Scalper Bot - Real-time Status</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Portfolio Value</h3>
                <div class="stat-value" id="portfolioValue">—</div>
                <p id="portfolioChange" class="neutral">Loading...</p>
            </div>

            <div class="stat-card">
                <h3>Profit / Loss</h3>
                <div class="stat-value" id="pnlAmount">—</div>
                <p id="pnlPercent" class="neutral">Loading...</p>
            </div>

            <div class="stat-card">
                <h3>Win Rate</h3>
                <div class="stat-value" id="winRate">—</div>
                <p id="tradeStats" class="neutral">Loading...</p>
            </div>

            <div class="stat-card">
                <h3>Open Positions</h3>
                <div class="stat-value" id="openPositions">—</div>
                <p id="botMode" class="neutral">Loading...</p>
            </div>
        </div>

        <div class="info-section">
            <h2>📊 Active Positions</h2>
            <div id="positionsList">
                <p class="loading">Loading positions...</p>
            </div>
        </div>

        <div class="info-section">
            <h2>📈 Recent Trades</h2>
            <div id="tradesList">
                <p class="loading">Loading trades...</p>
            </div>
        </div>

        <div id="errorContainer"></div>

        <div class="update-time">
            Last update: <span id="lastUpdate">—</span>
        </div>
    </div>

    <script>
        const API_BASE = '/api/bot';

        async function apiFetch(path) {
            try {
                const res = await fetch(API_BASE + path);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                return await res.json();
            } catch (e) {
                console.error(`API error: ${path} - ${e.message}`);
                throw e;
            }
        }

        async function updateDashboard() {
            try {
                // Clear errors
                document.getElementById('errorContainer').innerHTML = '';

                // Fetch data
                const status = await apiFetch('/status');
                const positions = await apiFetch('/positions');
                const trades = await apiFetch('/trades');

                // Update summary cards
                document.getElementById('portfolioValue').textContent =
                    '$' + status.portfolio_value.toFixed(2);

                const pnlAmount = status.pnl_amount;
                const pnlPct = status.pnl_percent;
                const pnlClass = pnlAmount >= 0 ? 'positive' : 'negative';
                document.getElementById('pnlAmount').textContent =
                    (pnlAmount >= 0 ? '+' : '') + '$' + Math.abs(pnlAmount).toFixed(2);
                document.getElementById('pnlAmount').className = 'stat-value ' + pnlClass;
                document.getElementById('pnlPercent').textContent =
                    (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '% ROI';
                document.getElementById('pnlPercent').className = pnlClass;

                document.getElementById('winRate').textContent =
                    status.win_rate.toFixed(0) + '%';
                document.getElementById('tradeStats').textContent =
                    `${status.wins}W / ${status.losses}L (${status.total_trades} total)`;

                document.getElementById('openPositions').textContent =
                    status.open_positions;
                const modeBadgeClass = status.mode === 'LIVE' ? 'mode-live' : 'mode-paper';
                document.getElementById('botMode').innerHTML =
                    `<span class="mode-badge ${modeBadgeClass}">${status.mode}</span>`;

                // Update positions
                const posList = document.getElementById('positionsList');
                if (positions.positions.length === 0) {
                    posList.innerHTML = '<p class="neutral">No open positions - monitoring pairs...</p>';
                } else {
                    posList.innerHTML = '<div style="font-size: 0.85em; color: #00cc00; margin-bottom: 10px;">Symbol | Entry | Current | P&L</div>';
                    positions.positions.forEach(pos => {
                        const pnl = pos.pnl_percent;
                        const pnlClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
                        const item = document.createElement('div');
                        item.className = 'position-item';
                        item.innerHTML = `
                            <span class="symbol">${pos.symbol}</span>
                            <span class="price">$${pos.entry_price.toFixed(4)}</span>
                            <span class="price">$${pos.current_price.toFixed(4)}</span>
                            <span class="${pnlClass}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</span>
                        `;
                        posList.appendChild(item);
                    });
                }

                // Update trades
                const tradeList = document.getElementById('tradesList');
                if (trades.trades.length === 0) {
                    tradeList.innerHTML = '<p class="neutral">No closed trades yet...</p>';
                } else {
                    tradeList.innerHTML = '<div style="font-size: 0.85em; color: #00cc00; margin-bottom: 10px;">Symbol | Entry | Exit | P&L | Date</div>';
                    trades.trades.slice(-20).reverse().forEach(trade => {
                        const pnl = trade.pnl || 0;
                        const pnlClass = pnl >= 0 ? 'pnl-positive' : 'pnl-negative';
                        const item = document.createElement('div');
                        item.className = 'trade-item';
                        const date = new Date(trade.exit_time || Date.now()).toLocaleDateString('en-US', {
                            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                        });
                        item.innerHTML = `
                            <span class="symbol">${trade.symbol || 'N/A'}</span>
                            <span class="price">$${(trade.entry_price || 0).toFixed(4)}</span>
                            <span class="price">$${(trade.exit_price || 0).toFixed(4)}</span>
                            <span class="${pnlClass}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}%</span>
                            <span style="color: #00aa00;">${date}</span>
                        `;
                        tradeList.appendChild(item);
                    });
                }

                // Update timestamp
                const now = new Date();
                document.getElementById('lastUpdate').textContent =
                    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            } catch (e) {
                const errorDiv = document.getElementById('errorContainer');
                errorDiv.innerHTML = `<div class="error">⚠️ Error loading data: ${e.message}</div>`;
                console.error('Dashboard error:', e);
            }
        }

        // Initial load and auto-refresh
        updateDashboard();
        setInterval(updateDashboard, 30000); // Refresh every 30 seconds
    </script>
</body>
</html>
