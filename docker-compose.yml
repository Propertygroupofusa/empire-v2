version: '3.8'

services:
  # Existing services
  empire-api:
    build: .
    ports:
      - "10000:10000"
    environment:
      - PORT=10000
      - ALPACA_API_KEY=${ALPACA_API_KEY}
      - ALPACA_SECRET_KEY=${ALPACA_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - SYNTHESIA_API_KEY=${SYNTHESIA_API_KEY}
    volumes:
      - ./video_exports:/app/video_exports
    networks:
      - empire-network

  # Video Editor API
  video-editor-api:
    build:
      context: .
      dockerfile: Dockerfile.video-editor
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - MAX_VIDEO_SIZE=500000000
    volumes:
      - ./video_uploads:/app/video_uploads
      - ./video_temp:/app/video_temp
      - ./video_exports:/app/video_exports
    depends_on:
      - empire-api
    networks:
      - empire-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/video/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Video Auto-Editor (Synthesia webhook + auto-edit/publish)
  video-auto-editor:
    build:
      context: .
      dockerfile: Dockerfile.video-editor
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=production
      - VIDEO_EDITOR_API_URL=http://video-editor-api:5001
      - YOUTUBE_API_URL=http://empire-api:10000
      - SYNTHESIA_WEBHOOK_SECRET=${SYNTHESIA_WEBHOOK_SECRET}
    command: python video_auto_editor.py
    depends_on:
      - video-editor-api
      - empire-api
    networks:
      - empire-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/api/auto-editor/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Video Generator (FREE AI video creation, no Synthesia needed)
  video-generator:
    build:
      context: .
      dockerfile: Dockerfile.video-editor
    ports:
      - "5003:5003"
    environment:
      - FLASK_ENV=production
      - VIDEO_AUTO_EDITOR_URL=http://video-auto-editor:5002
    command: python video_generator_bot.py
    volumes:
      - ./video_temp:/app/video_temp
      - ./video_exports:/app/video_exports
    depends_on:
      - video-auto-editor
    networks:
      - empire-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/api/video-gen/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Video Editor Frontend
  video-editor-frontend:
    build:
      context: ./video-editor
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5001
    depends_on:
      - video-editor-api
    networks:
      - empire-network
    stdin_open: true
    tty: true

networks:
  empire-network:
    driver: bridge

volumes:
  video_uploads:
  video_temp:
  video_exports:
